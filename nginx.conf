server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: all unknown paths serve index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* calls to the backend container
    # "aida-backend" is resolved by Docker's internal DNS (Coolify network)
    location /api/ {
        proxy_pass http://aida-backend:8000/api/;
        proxy_http_version 1.1;

        # SSE / streaming: disable ALL buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;

        # Long timeout for streaming chat responses
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        # Forward real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}